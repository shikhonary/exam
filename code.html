<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Coaching Setup - Step 1</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              surface: "#f8f9ff",
              "on-secondary-fixed": "#002113",
              "inverse-on-surface": "#eaf1ff",
              "surface-tint": "#006c49",
              "primary-container": "#10b981",
              "surface-variant": "#d3e4fe",
              "secondary-fixed-dim": "#9ed2b5",
              "on-secondary-fixed-variant": "#1e4f3a",
              "on-primary": "#ffffff",
              "surface-container-highest": "#d3e4fe",
              "on-error-container": "#93000a",
              "surface-dim": "#cbdbf5",
              "secondary-fixed": "#baeed1",
              "on-tertiary-fixed": "#410005",
              "on-tertiary-container": "#711419",
              "tertiary-fixed-dim": "#ffb3af",
              "surface-container": "#e5eeff",
              "on-surface-variant": "#3c4a42",
              "on-tertiary": "#ffffff",
              "on-surface": "#0b1c30",
              "tertiary-container": "#fc7c78",
              secondary: "#376850",
              "tertiary-fixed": "#ffdad7",
              tertiary: "#a43a3a",
              "outline-variant": "#bbcabf",
              "on-secondary-container": "#3c6c54",
              "error-container": "#ffdad6",
              "inverse-primary": "#4edea3",
              "on-background": "#0b1c30",
              "on-primary-fixed": "#002113",
              "surface-container-low": "#eff4ff",
              "inverse-surface": "#213145",
              "secondary-container": "#b7ebce",
              primary: "#006c49",
              "surface-bright": "#f8f9ff",
              "surface-container-high": "#dce9ff",
              "primary-fixed": "#6ffbbe",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#005236",
              outline: "#6c7a71",
              "on-error": "#ffffff",
              "primary-fixed-dim": "#4edea3",
              error: "#ba1a1a",
              "on-tertiary-fixed-variant": "#842225",
              "surface-container-lowest": "#ffffff",
              "on-primary-container": "#00422b",
              background: "#f8f9ff",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            fontFamily: {
              headline: ["Inter", "sans-serif"],
              display: ["Inter", "sans-serif"],
              body: ["Inter", "sans-serif"],
              label: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-family: "Material Symbols Outlined";
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: "liga";
        -webkit-font-smoothing: antialiased;
      }

      /* Signature Gradient for high-impact elements */
      .bg-signature-gradient {
        background: linear-gradient(135deg, #006c49 0%, #10b981 100%);
      }

      .hover\:bg-signature-gradient:hover {
        background: linear-gradient(135deg, #006c49 0%, #10b981 100%);
      }
    </style>
  </head>
  <body
    class="bg-background text-on-background font-body min-h-screen antialiased flex flex-col items-center justify-center p-4 md:p-8"
  >
    <div class="w-full max-w-4xl mx-auto flex flex-col gap-12">
      <!-- Header & Progress -->
      <header class="flex flex-col gap-8 w-full">
        <div class="flex items-center gap-4">
          <div
            class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center shadow-sm"
          >
            <span
              class="material-symbols-outlined text-primary"
              data-weight="fill"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >school</span
            >
          </div>
          <div>
            <h1
              class="text-3xl md:text-4xl font-headline font-bold text-on-background tracking-tight"
            >
              Coaching Setup
            </h1>
            <p class="text-on-surface-variant mt-1 text-lg">
              Core institutional enrollment details
            </p>
          </div>
        </div>
        <!-- Progress Indicator -->
        <div class="w-full relative py-6">
          <!-- Connecting Line Base -->
          <div
            class="absolute top-1/2 left-0 w-full h-1 bg-surface-variant -translate-y-1/2 rounded-full z-0"
          ></div>
          <!-- Active Line Progress -->
          <div
            class="absolute top-1/2 left-0 w-[12.5%] h-1 bg-primary -translate-y-1/2 rounded-full z-0 transition-all duration-500"
          ></div>
          <div class="flex justify-between relative z-10 w-full">
            <!-- Step 1 (Active) -->
            <div class="flex flex-col items-center gap-2 group">
              <div
                class="w-10 h-10 rounded-full bg-primary text-on-primary flex items-center justify-center font-bold shadow-lg ring-4 ring-surface"
              >
                1
              </div>
              <span
                class="text-sm font-label font-semibold text-primary absolute -bottom-6 whitespace-nowrap"
                >Setup</span
              >
            </div>
            <!-- Step 2 -->
            <div class="flex flex-col items-center gap-2">
              <div
                class="w-10 h-10 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-medium ring-4 ring-surface"
              >
                2
              </div>
              <span
                class="text-sm font-label text-on-surface-variant absolute -bottom-6 whitespace-nowrap hidden md:block"
                >Preferences</span
              >
            </div>
            <!-- Step 3 -->
            <div class="flex flex-col items-center gap-2">
              <div
                class="w-10 h-10 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-medium ring-4 ring-surface"
              >
                3
              </div>
              <span
                class="text-sm font-label text-on-surface-variant absolute -bottom-6 whitespace-nowrap hidden md:block"
                >Schedule</span
              >
            </div>
            <!-- Step 4 -->
            <div class="flex flex-col items-center gap-2">
              <div
                class="w-10 h-10 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-medium ring-4 ring-surface"
              >
                4
              </div>
              <span
                class="text-sm font-label text-on-surface-variant absolute -bottom-6 whitespace-nowrap hidden md:block"
                >Goals</span
              >
            </div>
            <!-- Step 5 -->
            <div class="flex flex-col items-center gap-2">
              <div
                class="w-10 h-10 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-medium ring-4 ring-surface"
              >
                5
              </div>
              <span
                class="text-sm font-label text-on-surface-variant absolute -bottom-6 whitespace-nowrap hidden md:block"
                >Review</span
              >
            </div>
          </div>
        </div>
      </header>
      <!-- Main Form Canvas -->
      <main
        class="w-full bg-surface-container-lowest rounded-[12px] p-8 md:p-12 shadow-[0_8px_30px_rgb(11,28,48,0.04)] relative overflow-hidden"
      >
        <!-- Decorative asymmetrical element -->
        <div
          class="absolute -top-24 -right-24 w-64 h-64 bg-primary-container opacity-5 rounded-full blur-3xl pointer-events-none"
        ></div>
        <form class="flex flex-col gap-10 relative z-10">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Academic Year -->
            <div class="flex flex-col gap-2">
              <label
                class="text-sm font-label font-medium text-on-surface-variant"
                for="academic-year"
                >Academic Year</label
              >
              <div class="relative">
                <select
                  class="w-full appearance-none bg-surface-container-low text-on-surface rounded-[12px] px-4 py-3 border-none focus:ring-2 focus:ring-primary/40 focus:outline-none transition-all duration-200"
                  id="academic-year"
                >
                  <option disabled="" selected="" value="">
                    Select year...
                  </option>
                  <option value="2024-2025">2024 - 2025</option>
                  <option value="2023-2024">2023 - 2024</option>
                </select>
                <span
                  class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none"
                  >expand_more</span
                >
              </div>
            </div>
            <!-- Academic Class -->
            <div class="flex flex-col gap-2">
              <label
                class="text-sm font-label font-medium text-on-surface-variant"
                for="academic-class"
                >Academic Class</label
              >
              <div class="relative">
                <select
                  class="w-full appearance-none bg-surface-container-low text-on-surface rounded-[12px] px-4 py-3 border-none focus:ring-2 focus:ring-primary/40 focus:outline-none transition-all duration-200"
                  id="academic-class"
                >
                  <option disabled="" selected="" value="">
                    Select class...
                  </option>
                  <option value="freshman">Freshman</option>
                  <option value="sophomore">Sophomore</option>
                  <option value="junior">Junior</option>
                  <option value="senior">Senior</option>
                  <option value="graduate">Graduate</option>
                </select>
                <span
                  class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none"
                  >expand_more</span
                >
              </div>
            </div>
            <!-- Student ID -->
            <div class="flex flex-col gap-2">
              <label
                class="text-sm font-label font-medium text-on-surface-variant"
                for="student-id"
                >Student ID</label
              >
              <div class="relative">
                <span
                  class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-70"
                  >badge</span
                >
                <input
                  class="w-full bg-surface-container-low text-on-surface rounded-[12px] pl-12 pr-4 py-3 border-none focus:ring-2 focus:ring-primary/40 focus:outline-none transition-all duration-200 placeholder:text-on-surface-variant/50"
                  id="student-id"
                  placeholder="Enter ID number"
                  type="text"
                />
              </div>
            </div>
            <!-- Batch -->
            <div class="flex flex-col gap-2">
              <label
                class="text-sm font-label font-medium text-on-surface-variant"
                for="batch"
                >Batch</label
              >
              <div class="relative">
                <select
                  class="w-full appearance-none bg-surface-container-low text-on-surface rounded-[12px] px-4 py-3 border-none focus:ring-2 focus:ring-primary/40 focus:outline-none transition-all duration-200"
                  id="batch"
                >
                  <option disabled="" selected="" value="">
                    Assign batch...
                  </option>
                  <option value="alpha">Alpha Cohort</option>
                  <option value="beta">Beta Cohort</option>
                  <option value="gamma">Gamma Cohort</option>
                  <option value="delta">Delta Cohort</option>
                </select>
                <span
                  class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none"
                  >expand_more</span
                >
              </div>
            </div>
          </div>
          <!-- Divider -->
          <div class="w-full h-px bg-surface-variant my-2"></div>
          <!-- Actions -->
          <div class="flex items-center justify-end gap-4 mt-4">
            <button
              class="px-6 py-3 rounded-[12px] text-primary font-medium hover:bg-surface-container-low transition-colors duration-200"
              type="button"
            >
              Save Draft
            </button>
            <button
              class="px-8 py-3 rounded-[12px] bg-primary text-on-primary font-medium hover:bg-signature-gradient transition-all duration-300 shadow-[0_4px_14px_rgba(0,108,73,0.2)] hover:shadow-[0_6px_20px_rgba(0,108,73,0.3)] flex items-center gap-2"
              type="button"
            >
              Continue to Step 2
              <span class="material-symbols-outlined text-[20px]"
                >arrow_forward</span
              >
            </button>
          </div>
        </form>
      </main>
      <!-- Footer Injection -->
      <footer
        class="bg-slate-50 dark:bg-slate-950 docked full-width bottom-0 text-emerald-700 dark:text-emerald-400"
      >
        <div
          class="bg-slate-100 dark:bg-slate-900 flat no shadows flex flex-col md:flex-row justify-between items-center w-full px-8 py-12 max-w-7xl mx-auto Headlines: Inter bold -0.02em letter-spacing. Body: Inter body-md text-slate-900 dark:text-slate-100. Labels: label-md font-medium."
        >
          <div
            class="text-lg font-bold text-emerald-800 dark:text-emerald-300 mb-6 md:mb-0"
          >
            <span class="material-symbols-outlined align-middle mr-2"
              >token</span
            >
            Veridian Academy
          </div>
          <nav class="flex flex-wrap justify-center gap-6">
            <a
              class="text-slate-500 dark:text-slate-400 hover:text-emerald-600 dark:hover:text-emerald-300 transition-colors duration-200 text-sm"
              href="#"
              >Privacy Policy</a
            >
            <a
              class="text-slate-500 dark:text-slate-400 hover:text-emerald-600 dark:hover:text-emerald-300 transition-colors duration-200 text-sm"
              href="#"
              >Terms of Service</a
            >
            <a
              class="text-slate-500 dark:text-slate-400 hover:text-emerald-600 dark:hover:text-emerald-300 transition-colors duration-200 text-sm"
              href="#"
              >Help Center</a
            >
            <a
              class="text-slate-500 dark:text-slate-400 hover:text-emerald-600 dark:hover:text-emerald-300 transition-colors duration-200 text-sm"
              href="#"
              >Accessibility</a
            >
          </nav>
        </div>
        <div
          class="text-center py-4 text-xs text-slate-500 dark:text-slate-400"
        >
          © 2024 Veridian Academy. All rights reserved.
        </div>
      </footer>
    </div>
  </body>
</html>
